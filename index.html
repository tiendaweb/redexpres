<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Express - Sistema de Gestión de Órdenes e Inventario FTTH">
  <title>Express — Sistema de Gestión Integral</title>

  <!-- CSS Styles -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/glass-design.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/icons.css">

  <!-- Bootstrap Icons CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90' fill='%2300e5ff'>E</text></svg>">
</head>
<body>
  <!-- SIDEBAR -->
  <aside class="sidebar glass-light">
    <div class="sidebar-logo" style="padding: var(--spacing-md); margin-bottom: var(--spacing-lg); border-bottom: 1px solid var(--border-primary);">
      <div style="font-size: 1.5rem; font-family: 'Syne', sans-serif; font-weight: 700; color: var(--cyan); text-align: center;">E</div>
      <div style="font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-top: 0.25rem;">EXPRESS</div>
    </div>

    <nav style="display: flex; flex-direction: column; gap: 0;">
      <a href="#dashboard" class="sidebar-item active" data-route="dashboard" title="Dashboard">
        <i class="bi bi-graph-up" style="font-size: 1.25rem;"></i>
        <span class="sidebar-label" style="font-size: 0.85rem;">Dashboard</span>
      </a>

      <a href="#ordenes" class="sidebar-item" data-route="ordenes" title="Órdenes">
        <i class="bi bi-clipboard-list" style="font-size: 1.25rem;"></i>
        <span class="sidebar-label" style="font-size: 0.85rem;">Órdenes</span>
      </a>

      <a href="#inventario" class="sidebar-item" data-route="inventario" title="Inventario">
        <i class="bi bi-box" style="font-size: 1.25rem;"></i>
        <span class="sidebar-label" style="font-size: 0.85rem;">Inventario</span>
      </a>

      <a href="#clientes" class="sidebar-item" data-route="clientes" title="Clientes">
        <i class="bi bi-people" style="font-size: 1.25rem;"></i>
        <span class="sidebar-label" style="font-size: 0.85rem;">Clientes</span>
      </a>

      <a href="#empleados" class="sidebar-item" data-route="empleados" title="Empleados">
        <i class="bi bi-person-badge" style="font-size: 1.25rem;"></i>
        <span class="sidebar-label" style="font-size: 0.85rem;">Empleados</span>
      </a>

      <a href="#reportes" class="sidebar-item" data-route="reportes" title="Reportes">
        <i class="bi bi-bar-chart" style="font-size: 1.25rem;"></i>
        <span class="sidebar-label" style="font-size: 0.85rem;">Reportes</span>
      </a>

      <a href="#admin" class="sidebar-item" data-route="admin" title="Administración">
        <i class="bi bi-gear" style="font-size: 1.25rem;"></i>
        <span class="sidebar-label" style="font-size: 0.85rem;">Admin</span>
      </a>
    </nav>

    <div style="margin-top: auto; padding-top: var(--spacing-lg); border-top: 1px solid var(--border-primary);">
      <button class="sidebar-item" id="theme-toggle" title="Cambiar tema">
        <i class="bi bi-moon-stars" style="font-size: 1.25rem;" id="theme-icon"></i>
        <span class="sidebar-label" style="font-size: 0.85rem;">Tema</span>
      </button>

      <button class="sidebar-item" title="Cerrar sesión">
        <i class="bi bi-box-arrow-left" style="font-size: 1.25rem;"></i>
        <span class="sidebar-label" style="font-size: 0.85rem;">Salir</span>
      </button>
    </div>
  </aside>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="navbar-left">
      <h2 id="page-title" style="margin: 0; font-size: 1.5rem;">Dashboard</h2>
    </div>

    <div class="navbar-right">
      <input type="text" placeholder="Buscar..." class="form-control" style="max-width: 250px; padding: 0.5rem 1rem;">

      <div style="display: flex; align-items: center; gap: 1rem; padding-left: 1rem; border-left: 1px solid var(--border-primary);">
        <div style="position: relative;">
          <button style="background: none; border: none; cursor: pointer; color: var(--text-primary); position: relative;">
            <i class="bi bi-bell" style="font-size: 1.25rem;"></i>
            <span style="position: absolute; top: -5px; right: -5px; background: var(--red); color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700;">3</span>
          </button>
        </div>

        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <div style="width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--cyan), var(--blue)); display: flex; align-items: center; justify-content: center; color: var(--bg-base); font-weight: 700;">UD</div>
          <div>
            <div style="font-size: 0.85rem; font-weight: 600;">Usuario Demo</div>
            <div style="font-size: 0.75rem; color: var(--text-muted);">Admin</div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div id="app-content">
      <!-- Contenido dinámico será renderizado aquí -->
    </div>
  </main>

  <!-- NOTIFICATIONS CONTAINER -->
  <div id="notifications-container" style="position: fixed; bottom: 2rem; right: 2rem; z-index: var(--z-notification); display: flex; flex-direction: column; gap: 1rem;"></div>

  <!-- MODAL CONTAINER -->
  <div id="modal-container"></div>

  <!-- CORE JS -->
  <script src="js/utils/theme.js"></script>
  <script src="js/core/state-manager.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/core/event-bus.js"></script>

  <!-- SERVICES -->
  <script src="js/services/api-service.js"></script>
  <script src="js/services/storage-service.js"></script>
  <script src="js/services/notification-service.js"></script>

  <!-- UTILS -->
  <script src="js/utils/validators.js"></script>
  <script src="js/utils/formatters.js"></script>
  <script src="js/utils/constants.js"></script>

  <!-- DB (Mock Data) -->
  <script src="js/db/mock-data.js"></script>

  <!-- COMPONENTS -->
  <script src="js/components/modal.js"></script>
  <script src="js/components/table.js"></script>
  <script src="js/components/form.js"></script>

  <!-- MODULES -->
  <script src="js/modules/dashboard/dashboard.js"></script>
  <script src="js/modules/ordenes/ordenes.js"></script>
  <script src="js/modules/inventario/inventario.js"></script>
  <script src="js/modules/clientes/clientes.js"></script>
  <script src="js/modules/empleados/empleados.js"></script>
  <script src="js/modules/reportes/reportes.js"></script>
  <script src="js/modules/admin/admin.js"></script>

  <!-- APP INIT -->
  <script src="js/core/app.js"></script>

  <style>
    /* Estilos inline para sidebar mobile */
    @media (max-width: 768px) {
      .sidebar {
        width: 60px;
      }

      .sidebar-label {
        display: none;
      }

      .navbar {
        left: 60px;
      }

      .main-content {
        margin-left: 60px;
      }
    }

    @media (max-width: 480px) {
      .sidebar {
        width: 50px;
      }

      .navbar {
        left: 50px;
        flex-wrap: wrap;
        height: auto;
      }

      .navbar-left {
        flex-basis: 100%;
        order: 2;
      }

      .main-content {
        margin-left: 50px;
        margin-top: 140px;
      }
    }

    .form-control {
      background-color: var(--bg-input);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      transition: all var(--transition-fast);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px var(--cyan-dim);
    }
  </style>
</body>
</html>
