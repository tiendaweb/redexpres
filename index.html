<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OmniStock FTTH — Sistema de Gestión de Inventario">
  <title>OmniStock FTTH — Sistema de Gestión de Inventario</title>

  <!-- CSS Styles -->
  <link rel="stylesheet" href="css/variables-theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/glass-design.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90' fill='%2300e5ff'>OS</text></svg>">

  <style>
    body {
      font-family: var(--font-body);
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="nav-logo">OS</div>
  <button class="nav-btn active" onclick="Router.navigate('dashboard')" title="Dashboard">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('instalacion')" title="Instalación">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 2l9 5v9a9 9 0 0 1-18 0v-9l9-5z"/><path d="M12 9v6m-3-3h6"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('materiales')" title="Materiales">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="4" width="7" height="7" rx="1.5"/><rect x="14" y="4" width="7" height="7" rx="1.5"/><rect x="3" y="15" width="7" height="7" rx="1.5"/><rect x="14" y="15" width="7" height="7" rx="1.5"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('certificacion')" title="Certificación">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4m-10.5 17A8.5 8.5 0 1 1 20.5 9.5"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('existencias')" title="Existencias">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20 7l-8.5 9.5L7 12M3 19h18a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H3a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('movimientos')" title="Movimientos">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M7 16V4m0 0L4 7m3-3 3 3M17 8v12m0 0 3-3m-3 3-3-3"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('fibra')" title="Fibra Óptica">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M13 10l4 4m0 0l-4 4m4-4H3m14-7V4m0 16v-2"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('tecnicos')" title="Técnicos">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M16 11a4 4 0 1 1-8 0 4 4 0 0 1 8 0z"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('alertas')" title="Alertas">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <span style="position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; border-radius: 50%; background: var(--red)"></span>
  </button>

  <!-- SEPARATOR -->
  <div style="height: 1px; background: var(--border-glass); margin: 12px 8px; opacity: 0.5"></div>

  <!-- EDIT MODULES -->
  <button class="nav-btn" onclick="Router.navigate('editar-materiales')" title="Editar Materiales">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('editar-tecnicos')" title="Editar Técnicos">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 1 1 0 8 4 4 0 0 1 0-8M9 19h6a6 6 0 0 1 6 6v1h-18v-1a6 6 0 0 1 6-6zm3-14a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('editar-equipos')" title="Editar Equipos">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M10.5 1.5H3.75A2.25 2.25 0 0 0 1.5 3.75v16.5A2.25 2.25 0 0 0 3.75 22.5h16.5a2.25 2.25 0 0 0 2.25-2.25V13.5M22.5 1.5h-9M16.5 1.5v9M13.5 4.5h9"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('configuracion')" title="Configuración">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m3.08 3.08l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m3.08-3.08l4.24-4.24"/></svg>
  </button>

  <button class="nav-btn" id="theme-toggle" title="Cambiar tema" style="margin-top: auto">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</nav>

<!-- MAIN -->
<main id="main">

  <!-- TOPBAR -->
  <div class="topbar fade-up delay-1">
    <div>
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 4px">
        <h1 class="font-display" style="font-size: 22px; font-weight: 800; letter-spacing: -0.02em">OmniStock <span class="text-cyan">FTTH</span></h1>
        <span class="badge badge-cyan">
          <span class="dot dot-cyan"></span> LIVE
        </span>
      </div>
      <p class="text-muted" style="font-size: 12px">Sistema de Gestión de Inventario · Express Salta</p>
    </div>
    <div style="display: flex; gap: 12px">
      <button class="btn btn-secondary" style="font-size: 12px; padding: 8px 14px">↓ Exportar</button>
      <button class="btn btn-secondary" style="font-size: 12px; padding: 8px 14px">⚙ Config</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main-content" style="min-height: calc(100vh - 200px)">
    <!-- Modules render here -->
  </div>

  <!-- Legacy page containers for compatibility -->
  <div id="page-dashboard" class="page active" style="display: none"></div>
  <div id="page-movimientos" class="page" style="display: none"></div>
  <div id="page-alertas" class="page" style="display: none"></div>

</main>

<!-- NOTIFICATION -->
<div id="notif" style="display: flex; align-items: center; gap: 10px">
  <span id="notif-icon" style="font-size: 16px"></span>
  <span id="notif-msg"></span>
</div>

<!-- CORE MODULES -->
<script src="js/core/event-bus.js"></script>
<script src="js/core/state-manager.js"></script>
<script src="js/core/theme-manager.js"></script>
<script src="js/core/router.js"></script>

<!-- DATA -->
<script src="js/db/mock-data.js"></script>

<!-- MODULES -->
<script src="js/modules/dashboard/dashboard.js"></script>
<script src="js/modules/instalacion/instalacion.js"></script>
<script src="js/modules/materiales/materiales.js"></script>
<script src="js/modules/certificacion/certificacion.js"></script>
<script src="js/modules/existencias/existencias.js"></script>
<script src="js/modules/movimientos/movimientos.js"></script>
<script src="js/modules/fibra-optica/fibra.js"></script>
<script src="js/modules/tecnicos/tecnicos.js"></script>
<script src="js/modules/alertas/alertas.js"></script>

<!-- EDIT MODULES (CRUD) -->
<script src="js/modules/editar-materiales/editar-materiales.js"></script>
<script src="js/modules/editar-tecnicos/editar-tecnicos.js"></script>
<script src="js/modules/editar-equipos/editar-equipos.js"></script>
<script src="js/modules/configuracion/configuracion.js"></script>

<!-- APP INITIALIZER -->
<script src="js/core/app.js"></script>

</body>
</html>
