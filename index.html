<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ADMIN EXPRESS — Sistema de Gestión de Inventario">
  <title>ADMIN EXPRESS — Sistema de Gestión de Inventario</title>

  <!-- CSS Styles -->
  <link rel="stylesheet" href="css/variables-theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/glass-design.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%2300e5ff' opacity='0.1'/><path d='M 35 35 L 65 65 M 35 65 L 65 35 M 45 30 L 55 30 L 55 40 L 45 40 Z M 45 60 L 55 60 L 55 70 L 45 70 Z M 30 45 L 40 45 L 40 55 L 30 55 Z M 60 45 L 70 45 L 70 55 L 60 55 Z' stroke='%2300e5ff' stroke-width='3' fill='none' stroke-linecap='round'/></svg>">

  <style>
    body {
      font-family: var(--font-body);
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="nav-logo"><svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: white;"><circle cx="12" cy="12" r="8.5"/><path d="M12 7v10M7 12h10M10 10l4 4M10 14l4-4" stroke-linecap="round"/></svg></div>
  <button class="nav-btn active" onclick="Router.navigate('dashboard')" title="Dashboard">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('movimientos')" title="Movimientos">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M7 16V4m0 0L4 7m3-3 3 3M17 8v12m0 0 3-3m-3 3-3-3"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('fibra')" title="Fibra Óptica">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M13 10l4 4m0 0l-4 4m4-4H3m14-7V4m0 16v-2"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('tecnicos')" title="Técnicos">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M16 11a4 4 0 1 1-8 0 4 4 0 0 1 8 0z"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('alertas')" title="Alertas">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <span style="position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; border-radius: 50%; background: var(--red); box-shadow: 0 0 6px var(--red)"></span>
  </button>
  <button class="nav-btn" onclick="Router.navigate('ingresos')" title="Ingresos" style="margin-top: auto">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 2v20m-9-9h18M7 8l5-5 5 5M7 16l5 5 5-5"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('egresos-nodo')" title="Egresos Nodo">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 2l-8 8v11h5v-5h6v5h5V10L12 2M12 8a2 2 0 100-4 2 2 0 000 4z"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('instalaciones')" title="Instalaciones">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M16 11a4 4 0 1 1-8 0 4 4 0 0 1 8 0zM21 8l-4 4m4-4l-4-4m4 4h3"/></svg>
  </button>
  <button class="nav-btn" onclick="Router.navigate('desconexiones')" title="Desconexiones">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 2v20M2 12h20M2 8l4-4m-4 4l4 4M22 16l-4 4m4-4l-4-4"/></svg>
  </button>
  <button class="nav-btn" id="theme-toggle" title="Cambiar tema" style="margin-top: 12px">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</nav>

<!-- MAIN -->
<main id="main">

  <!-- TOPBAR -->
  <div class="topbar fade-up delay-1">
    <div>
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 4px">
        <h1 class="font-display" style="font-size: 22px; font-weight: 800; letter-spacing: -0.02em">ADMIN <span class="text-cyan">EXPRESS</span></h1>
        <span class="badge badge-cyan">
          <span class="dot dot-cyan"></span> LIVE
        </span>
      </div>
      <p class="text-muted" style="font-size: 12px">Sistema de Gestión de Inventario · Express Salta</p>
    </div>
    <div style="display: flex; gap: 12px; align-items: center; position: relative">
      <button class="btn btn-secondary" style="font-size: 12px; padding: 8px 14px">↓ Exportar</button>
      <button class="btn btn-secondary" onclick="Router.navigate('admin')" style="font-size: 12px; padding: 8px 14px">⚙ Config</button>
      <div id="user-menu-container" style="position: relative">
        <button class="btn btn-secondary" id="user-menu-toggle" style="font-size: 12px; padding: 8px 14px">👤 Usuario</button>
        <div id="user-menu-dropdown" class="glass" style="position: absolute; top: 100%; right: 0; min-width: 200px; margin-top: 8px; display: none; flex-direction: column; z-index: 1000; border-radius: 8px; overflow: hidden">
          <a href="#" data-menu="perfil" style="padding: 12px 16px; color: var(--text-light); text-decoration: none; border-bottom: 1px solid var(--border-color); font-size: 13px; display: flex; align-items: center; gap: 8px">👤 Perfil</a>
          <a href="#" data-menu="ia-providers" style="padding: 12px 16px; color: var(--text-light); text-decoration: none; border-bottom: 1px solid var(--border-color); font-size: 13px; display: flex; align-items: center; gap: 8px">🤖 Proveedores de IA</a>
          <a href="#" data-menu="presupuesto" style="padding: 12px 16px; color: var(--text-light); text-decoration: none; font-size: 13px; display: flex; align-items: center; gap: 8px">💰 Presupuesto</a>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main-content" style="min-height: calc(100vh - 200px)">
    <!-- Modules render here -->
  </div>

  <!-- Legacy page containers for compatibility -->
  <div id="page-dashboard" class="page active" style="display: none"></div>
  <div id="page-movimientos" class="page" style="display: none"></div>
  <div id="page-alertas" class="page" style="display: none"></div>

</main>

<!-- NOTIFICATION -->
<div id="notif" style="display: flex; align-items: center; gap: 10px">
  <span id="notif-icon" style="font-size: 16px"></span>
  <span id="notif-msg"></span>
</div>

<!-- CORE MODULES -->
<script src="js/core/event-bus.js"></script>
<script src="js/core/state-manager.js"></script>
<script src="js/core/theme-manager.js"></script>
<script src="js/core/router.js"></script>
<script src="js/core/user-menu.js"></script>

<!-- DATA -->
<script src="js/db/mock-data.js"></script>

<!-- MODULES -->
<script src="js/modules/dashboard/dashboard.js"></script>
<script src="js/modules/movimientos/movimientos.js"></script>
<script src="js/modules/fibra-optica/fibra.js"></script>
<script src="js/modules/tecnicos/tecnicos.js"></script>
<script src="js/modules/alertas/alertas.js"></script>
<script src="js/modules/ingresos/ingresos.js"></script>
<script src="js/modules/egresos-nodo/egresos-nodo.js"></script>
<script src="js/modules/instalaciones/instalaciones.js"></script>
<script src="js/modules/desconexiones/desconexiones.js"></script>
<script src="js/modules/presupuesto/presupuesto.js"></script>

<!-- APP INITIALIZER -->
<script src="js/core/app.js"></script>

</body>
</html>
